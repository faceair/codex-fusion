model_instructions_file = "instructions/fusion.md"

[features]
goals = true

[features.multi_agent_v2]
usage_hint_text = """
Proactive multi-agent delegation is active. Use sub-agents (sidekick for execution/discovery, reviewer for read-only risk review) as the default path for non-trivial work. Reuse existing sub-agent threads via send_input/resume_agent instead of spawning new ones for the same workflow."""

[agents.sidekick]
config_file = "agents/sidekick.toml"

[agents.reviewer]
config_file = "agents/reviewer.toml"
